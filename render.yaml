services:
  - type: web
    name: scottymd
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.20.0
      - key: PORT
        value: 3000
      - key: RENDER_URL
        fromService:
          type: web
          name: scottymd
          property: host
    healthCheckPath: /ping
    autoDeploy: true
